<h2 id="agents-need-a-human-in-the-loop">Agents need a human in the loop</h2>
<p>Agents operate autonomously. But some actions are too high-risk to let an agent execute without a human confirming.</p>
<ul>
<li><strong>Irreversible</strong>: deleting an account, sending a wire transfer</li>
<li><strong>Expensive</strong>: provisioning infrastructure, purchasing inventory</li>
<li><strong>Sensitive</strong>: sharing a document, modifying permissions</li>
<li><strong>Regulated</strong>: compliance-gated transactions, financial approvals</li>
</ul>
<p>Re-engaging the human prior to execution is table-stakes for agent auth.</p>
</section>

<h2 id="agent-harness-managed-1">Agent Harness Managed</h2>
<p>Agent Harness intercepts tool calls and determines if human confirmation is needed.<br />
Examples: Claude Code / <strong>A2H</strong></p>
<p>Pros:</p>
<ul>
<li>Native experience built into Agent UX</li>
<li>Agent Harness understands intent across many domains</li>
</ul>
<p>Cons:</p>
<ul>
<li>Can Harness be trusted to do HITL correctly?</li>
<li>How is HITL &quot;proven&quot; to the Domain being acted on?</li>
<li>How does logging / audit work?</li>
</ul>
</section>

<h2 id="domain-harness-managed">Domain Harness Managed</h2>
<p>Resource Server issues <code>WWW-Authenticate</code> challenge. Client replays challenge to Auth Server. Auth Server contacts user.</p>
<p>Pros:</p>
<ul>
<li>HITL approval cryptographically embedded via Access Token</li>
<li>AS in change of logging / audit responsibilities</li>
</ul>
<p>Cons:</p>
<ul>
<li>Approval workflow is Domain-specific</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-style="section {

<p>We are primarily interested in <strong>Domain Harness Managed HITL</strong></p>
<ul>
<li>Increasing usefulness of Access Tokens is good</li>
<li>Consolidating decision-making within the AS is good</li>
<li>Building on top of OAuth ecosystem is good</li>
</ul>

<h2 id="ciba-is-often-floated-as-the-answer">CIBA is often floated as the answer</h2>
<p>OpenID Connect Client-Initiated Backchannel Authentication checks many boxes:</p>
<ol>
<li><strong>AS owns the notification</strong> of the user (out-of-band channel: SMS, push, email)</li>
<li><strong>Client waits around</strong> for the result and retries later (polling)</li>
<li><strong>Newly issued access token</strong> contains verified proof of HITL from the AS</li>
</ol>
</section>

<h2 id="ciba-back-half-is-great">CIBA back half is great</h2>
<p>The parts that work well for HITL:</p>
<ul>
<li><strong>AS decides how to reach the user.</strong> The client doesn't need to know the channel.</li>
<li><strong>Polling is simple.</strong> Client just retries on an interval.</li>
<li><strong>Token is proof.</strong> The issued token carries evidence that a human approved.</li>
<li><strong>AS can take its time.</strong> No browser session to keep alive.</li>
</ul>
<p>This is exactly what we want. But...</p>
</section>

<h2 id="problem-1-client-initiated">Problem 1: <strong>Client</strong> Initiated</h2>
<p>The <strong>client</strong> decides when CIBA is required. The server has <strong>no way to signal it</strong>.</p>
<p>There's no mechanism for the AS to say, in response to a normal token request:</p>
<blockquote>
<p>&quot;Actually, I need human approval before I can issue this token. You need to wait a minute.&quot;</p>
</blockquote>
<p>The client must know in advance that CIBA is the right thing to do, and once CIBA is initiated the user must be contacted.</p>
<p>What if the server wants to decide <em>when</em> HITL is required dynamically, based on <strong>risk</strong>, <strong>policy</strong>, or <strong>context</strong>?</p>
</section>

<h2 id="problem-2-backchannel-authentication">Problem 2: Backchannel <strong>Authentication</strong></h2>
<p>CIBA is an <strong>OIDC</strong> extension, not an OAuth extension. It's optimized for <em>authenticating</em> a user, not <em>requesting authorization</em> to a resource.</p>
<p>The client must tell the AS <strong>who</strong> to send the notification to:</p>
<ul>
<li><code>id_token_hint</code> (a previously issued ID token)</li>
<li><code>login_hint</code> (an email, phone number, etc.)</li>
<li><code>login_hint_token</code></li>
</ul>
<p>The <strong>server</strong> cannot choose who to route the approval based on the request context.</p>
</section>

<h2 id="what-if-the-client-doesnt-know-who-the-approver-is">What if the client doesn't know who the approver is?</h2>
<p>With CIBA, the client must already know who that owner is and have an identifier for them. But often:</p>
<ul>
<li>The client <strong>doesn't know who owns the resource</strong></li>
<li>The approval might <strong>route to a system (ServiceNow, Okta Engine)</strong>, not a person</li>
<li>The approver <strong>might not be the resource owner</strong> (delegated approval)</li>
<li><strong>Multiple humans</strong> might need to approve</li>
</ul>
<p>CIBA can't model any of this.</p>
</section>

<h2 id="concrete-flexibility">Concrete flexibility</h2>
<ul>
<li><strong>Route to resource owner:</strong> Client wants to modify a document. AS knows who owns it. Client doesn't need to.</li>
<li><strong>Route to systems:</strong> Approval goes to a ServiceNow ticket, Jira workflow, or Slack channel.</li>
<li><strong>Delegated approval:</strong> IC is on vacation. Their manager can approve on their behalf.</li>
<li><strong>Multi-party:</strong> Two of three admins must approve before the token is issued.</li>
</ul>
<p>None of this is possible when the client picks the approver.</p>
</section>

<h2 id="fighting-consent-fatigue">Fighting Consent Fatigue</h2>
<p>Some CIBA implementations pepper the end user with individual approvals - one per unique request.</p>
<p>This leads to consent fatigue and increases the risk of a user approving a request they shouldn't.</p>
<p>CIBA is optimized for short-lived interactions notifying a specific user. By breaking this model we unlock:</p>
<ul>
<li>Batch approval workflows combining requests from many resources &amp; clients</li>
<li>Routing requests to users in a better position to evaluate them (IT Admins, Security professionals)</li>
<li>Programmatic approval or denial of requests based on standing policy</li>
</ul>
</section>

<h2 id="banking-already-needs-this">Banking already needs this</h2>
<p>We care about HITL for agents, but it turns out this pattern is generally useful.<br />
Some banking patterns require deferral for auth_code flows today.</p>

<h2 id="use-case-high-risk-transaction-evaluation">Use Case: High-Risk Transaction Evaluation</h2>
<p>A user initiates a high-risk transaction at their bank.<br />
The OP notices unusual behavior and decides to defer until further verification is complete.</p>
<p>Verification may involve:</p>
<ul>
<li>Contacting the user through alternative channels</li>
<li>Manual review by a fraud analyst</li>
<li>Additional security checks</li>
</ul>
<p>The user does not need to remain in the banking application.<br />
Transaction processing continues in the background as soon as a decision is made.</p>
<p>This can take minutes to hours.</p>
</section>

<h2 id="use-case-id-verification-from-physical-evidence">Use Case: ID Verification from Physical Evidence</h2>
<p>Many jurisdictions lack widespread digital identity. Identity verification relies on scanning physical documents (passport, driver's license) plus a liveness check.</p>
<p>Usually automated systems handle this. Sometimes a human operator must manually verify. This takes a long time and may involve contacting the user via another channel.</p>
<p>The RP can continue with steps that don't require completed verification, and notify the user when the final decision lands. Compliant with regulation on automated decision-making.</p>
</section>

<h2 id="prior-art">Prior art</h2>
<p>Already an OIDF draft: <strong><code>openid-deferred-token-response-1_0</code></strong>.</p>
<p>It introduces <code>response_type=deferred_code</code> for <code>auth_code</code> flows that need arbitrary time to complete.</p>
<p>We're generalizing this: not just a new response type, but a pattern that applies to any <code>/token</code> response.</p>
<p>Significant overlap with <strong><code>draft-parecki-oauth-jwt-grant-interaction-response</code></strong> as well.</p>
</section>

<h2 id="parallel-workstreams">Parallel Workstreams</h2>
<p>DTR describes <em>how the AS notifies the Client</em> during an approval workflow.</p>
<p>There is no standard for cases where the AS wants to route the approval to a separate system (ServiceNow, Okta Engine).</p>
<p><code>draft-mcguinness-authzen-access-request-latest</code> in AuthZen WG seeks to address this gap.</p>
<p>This draft describes a common standard for requesting access from a workflow engine.</p>
</section>
